<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simule seu ganho — Cakto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4faf6;
      --surface: #ffffff;
      --surface-2: #f7fbf9;
      --border: #e6f0ea;
      --border-strong: #d6e6dc;
      --text: #0f1a14;
      --text-dim: #5b6b62;
      --text-mute: #8a9c93;
      --green: #1fbc5c;
      --green-bright: #1ed070;
      --green-dim: #15a04b;
      --green-tint: #e8f7ee;
      --green-glow: rgba(31, 188, 92, 0.14);
    }
    body {
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }
    .app {
      width: 100%;
      max-width: 620px;
      background: var(--surface);
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(31, 188, 92, 0.08), 0 2px 8px rgba(15, 26, 20, 0.04);
      overflow: hidden;
    }

    .header {
      padding: 28px 32px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--green-tint);
      display: flex; align-items: center; justify-content: center;
      color: var(--green-dim); flex-shrink: 0;
    }
    .header-title {
      font-size: 13px; font-weight: 700; letter-spacing: 1.4px;
      color: var(--green-dim); text-transform: uppercase;
    }
    .progress { display: flex; gap: 6px; align-items: center; }
    .progress-dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--border-strong); transition: background 0.2s ease, width 0.2s ease;
    }
    .progress-dot.active { background: var(--green); width: 22px; }
    .progress-dot.done { background: var(--green); }

    .step { padding: 20px 32px 24px; }
    .step-title {
      font-size: 22px; font-weight: 700; color: var(--text);
      letter-spacing: -0.4px; margin-bottom: 6px; line-height: 1.2;
    }
    .step-subtitle {
      font-size: 14px; color: var(--text-dim); margin-bottom: 22px; line-height: 1.5;
    }

    /* Step 0 — Intro / Lead magnet */
    .intro-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 999px;
      background: var(--green-tint); color: var(--green-dim);
      font-size: 12px; font-weight: 700; letter-spacing: 0.2px;
      margin-bottom: 16px;
    }
    .intro-pill .dot {
      width: 6px; height: 6px; border-radius: 999px; background: var(--green);
    }
    .intro-title {
      font-size: 28px; font-weight: 800; color: var(--text);
      letter-spacing: -0.8px; line-height: 1.15; margin-bottom: 12px;
    }
    .intro-title .accent { color: var(--green); }
    .intro-description {
      font-size: 15px; color: var(--text-dim); line-height: 1.55;
      margin-bottom: 22px;
    }
    .intro-benefits-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.3px;
      color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px;
    }
    .intro-benefits {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 24px;
    }
    .intro-benefit {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 12px;
    }
    .intro-benefit-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--green-tint); color: var(--green-dim);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .intro-benefit-text {
      font-size: 14px; color: var(--text); line-height: 1.4;
    }
    .intro-benefit-text strong { color: var(--text); font-weight: 700; }
    .intro-trust {
      font-size: 13px; color: var(--text-mute); text-align: center;
      margin-top: 14px; line-height: 1.5;
    }
    @media (max-width: 560px) {
      .intro-title { font-size: 24px; }
      .intro-description { font-size: 14px; }
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.3px;
      color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase;
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
    .field-row .field { margin-bottom: 0; }
    .field-helper {
      font-size: 13px; color: var(--text-dim); margin-top: -2px; margin-bottom: 10px; line-height: 1.45;
    }

    /* Currency / numeric input (calculadora) */
    .input-wrapper {
      position: relative; display: flex; align-items: center;
      background: var(--surface-2); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px 18px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .input-wrapper:focus-within {
      border-color: var(--green); background: var(--surface);
      box-shadow: 0 0 0 4px var(--green-glow);
    }
    .input-wrapper .prefix, .input-wrapper .suffix {
      color: var(--text-mute); font-size: 20px; font-weight: 500; pointer-events: none;
    }
    .input-wrapper .prefix { margin-right: 10px; }
    .input-wrapper .suffix { margin-left: 10px; }
    .input-wrapper input[type="number"] {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 24px; font-weight: 700;
      font-family: inherit; letter-spacing: -0.4px; min-width: 0; width: 100%;
    }
    .input-wrapper input::placeholder { color: var(--text-mute); font-weight: 600; }
    .input-wrapper input[type="number"]::-webkit-outer-spin-button,
    .input-wrapper input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .input-wrapper input[type="number"] { -moz-appearance: textfield; }

    /* Text / email / tel input (form steps) */
    .text-input, .select-input {
      width: 100%; padding: 14px 16px;
      background: var(--surface-2); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: 15px; font-weight: 500;
      font-family: inherit; outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .text-input::placeholder { color: var(--text-mute); font-weight: 500; }
    .text-input:focus, .select-input:focus {
      border-color: var(--green); background: var(--surface);
      box-shadow: 0 0 0 4px var(--green-glow);
    }
    .select-input {
      appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%235b6b62' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 40px;
      cursor: pointer;
    }
    .select-input.placeholder { color: var(--text-mute); }

    /* Radio list */
    .radio-list {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .radio-item {
      display: flex; align-items: center; justify-content: center;
      padding: 12px 14px;
      background: var(--surface-2); border: 1.5px solid var(--border);
      border-radius: 12px; cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
      user-select: none;
    }
    .radio-item:hover { border-color: var(--green); }
    .radio-item.selected {
      border-color: var(--green); background: var(--green-tint);
    }
    .radio-label {
      font-size: 14px; font-weight: 600; letter-spacing: -0.1px;
      color: var(--text); text-transform: none;
    }
    .radio-item.selected .radio-label { color: var(--green-dim); }
    .radio-item input[type="radio"] {
      position: absolute; opacity: 0; pointer-events: none;
      width: 0; height: 0; margin: 0; padding: 0;
    }

    /* Stepper (parcelas) */
    .stepper { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; }
    .stepper button {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--green-tint); border: none; color: var(--green-dim);
      font-size: 22px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
      flex-shrink: 0; line-height: 1; font-family: inherit;
    }
    .stepper button:hover:not(:disabled) { background: var(--green); color: #ffffff; }
    .stepper button:active:not(:disabled) { transform: scale(0.94); }
    .stepper button:disabled { opacity: 0.35; cursor: not-allowed; }
    .stepper-value {
      flex: 1; text-align: center; font-size: 24px; font-weight: 700;
      color: var(--text); letter-spacing: -0.4px;
    }

    /* Buttons */
    .nav {
      display: flex; gap: 10px; margin-top: 20px;
    }
    .nav .cta-secondary { flex: 0 0 auto; min-width: 110px; }
    .nav .cta-primary { flex: 1; margin-top: 0; }
    .cta-primary, .cta-secondary {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 16px 24px; border: 1.5px solid transparent;
      border-radius: 999px;
      font-size: 16px; font-weight: 700; letter-spacing: -0.1px;
      font-family: inherit; cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .cta-primary {
      background: var(--green); color: #ffffff;
      box-shadow: 0 8px 22px rgba(31, 188, 92, 0.28);
      width: 100%;
    }
    .cta-primary:hover:not(:disabled) { background: var(--green-bright); box-shadow: 0 12px 28px rgba(31, 188, 92, 0.36); }
    .cta-primary:active:not(:disabled) { transform: translateY(1px); }
    .cta-primary:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    .cta-secondary {
      background: transparent; color: var(--green-dim); border-color: var(--border-strong);
    }
    .cta-secondary:hover { background: var(--green-tint); border-color: var(--green); color: var(--green-dim); }
    .arrow { font-size: 18px; line-height: 1; }

    .helper { font-size: 14px; color: var(--text-dim); text-align: center; margin-top: 16px; line-height: 1.5; }
    .divider { height: 1px; background: var(--border); margin: 4px 32px 0; }

    /* Results */
    .results {
      padding: 24px 32px 28px;
      background: linear-gradient(180deg, rgba(232, 247, 238, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
    }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .results-header .left { display: flex; align-items: center; gap: 10px; }
    .results-header .bolt { color: var(--green); display: inline-flex; align-items: center; }
    .results-header .title {
      font-size: 13px; font-weight: 700; letter-spacing: 1.4px;
      color: var(--green-dim); text-transform: uppercase;
    }
    .refazer-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: none; color: var(--text-dim);
      font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease;
      padding: 6px 10px; margin: -6px -10px; border-radius: 8px;
    }
    .refazer-link:hover { color: var(--green-dim); background: var(--green-tint); }

    .result-block { margin-bottom: 22px; }
    .result-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.3px;
      color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase;
    }
    .result-label.green { color: var(--green-dim); }
    .result-value {
      font-size: 38px; font-weight: 700; color: var(--text);
      letter-spacing: -0.8px; line-height: 1.05; font-variant-numeric: tabular-nums;
    }
    .result-value.big { font-size: 52px; color: var(--green); letter-spacing: -1.2px; }
    .result-asterisk {
      font-size: 0.45em; font-weight: 600;
      color: var(--text-mute); margin-left: 4px;
      vertical-align: top; line-height: 1;
    }
    .result-value.big .result-asterisk { color: var(--green-bright); }
    .result-sub { font-size: 14px; color: var(--text-dim); margin-top: 8px; line-height: 1.5; }
    .result-sub strong { color: var(--text); font-weight: 600; }
    .result-divider { height: 1px; background: var(--border); margin: 22px 0; }

    /* Result entrance animation */
    @keyframes resultFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes valuePop {
      0%   { opacity: 0; transform: scale(0.92); }
      60%  { opacity: 1; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }
    .results.animate-in { animation: resultFadeIn 450ms cubic-bezier(0.22, 1, 0.36, 1) both; }
    .results.animate-in .result-block { animation: resultFadeIn 500ms cubic-bezier(0.22, 1, 0.36, 1) both; }
    .results.animate-in .result-block:nth-of-type(1) { animation-delay: 60ms; }
    .results.animate-in .result-block:nth-of-type(2) { animation-delay: 200ms; }
    .results.animate-in .result-value { display: inline-block; animation: valuePop 700ms cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 220ms; }
    .results.animate-in .result-value.big { animation-delay: 380ms; animation-duration: 850ms; }
    @media (prefers-reduced-motion: reduce) {
      .results.animate-in, .results.animate-in *, .results.animate-in .result-value { animation: none !important; }
    }

    @media (max-width: 560px) {
      body { padding: 16px; }
      .app { border-radius: 22px; }
      .header { padding: 22px 22px 4px; gap: 12px; }
      .header-icon { width: 36px; height: 36px; }
      .header-title { font-size: 12px; }
      .step { padding: 16px 22px 20px; }
      .step-title { font-size: 19px; }
      .divider { margin: 4px 22px 0; }
      .results { padding: 20px 22px 22px; }
      .field-row { grid-template-columns: 1fr; gap: 14px; }
      .radio-list { grid-template-columns: 1fr; }
      .input-wrapper { padding: 14px 16px; }
      .input-wrapper .prefix, .input-wrapper .suffix { font-size: 18px; }
      .input-wrapper input[type="number"] { font-size: 20px; }
      .stepper-value { font-size: 20px; }
      .stepper button { width: 32px; height: 32px; font-size: 20px; }
      .result-value { font-size: 30px; }
      .result-value.big { font-size: 40px; }
      .cta-primary, .cta-secondary { padding: 14px 20px; font-size: 15px; }
      .nav .cta-secondary { min-width: 96px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    /* ============================================================
     * CONFIGURAÇÃO — preencher com URLs do backend Cakto
     * ============================================================ */
    const CONFIG = {
      // Base da API que recebe os eventos do form. Ex.: "https://api.cakto.com.br"
      // Deixar string vazia desabilita o envio (silently no-op).
      API_BASE_URL: '',

      // Rotas REST por step. O backend deve aceitar JSON via POST.
      ENDPOINTS: {
        step1Identificacao: '/leads/calculadora/identificacao',
        step2Perfil:        '/leads/calculadora/perfil',
        step3Simulacao:     '/leads/calculadora/simulacao',
      },

      // Origens permitidas a receber o postMessage (Framer + domínio produção).
      // Atualizar quando publicar o site no domínio final.
      PARENT_ORIGINS: [
        'https://cakto.me',
        'https://www.cakto.me',
        // Adicione aqui a URL do projeto Framer, ex.:
        // 'https://cakto-website.framer.website',
      ],

      // Anti-bot: ignora envio se o lead chegou ao próximo step em menos de N ms.
      MIN_STEP_MS: 1500,
    };

    /* ============================================================
     * Helpers — segurança, tracking, sessão
     * ============================================================ */
    function uuid() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function captureUTM() {
      const params = new URLSearchParams(window.location.search);
      const utm = {};
      ['utm_source','utm_medium','utm_campaign','utm_term','utm_content','gclid','fbclid'].forEach(k => {
        const v = params.get(k);
        if (v) utm[k] = v.slice(0, 200);
      });
      return utm;
    }

    function sanitize(s) {
      // Strip control chars + limit length. Backend deve revalidar.
      return String(s ?? '').replace(/[\x00-\x1F\x7F]/g, '').trim().slice(0, 500);
    }

    async function track(path, body) {
      if (!CONFIG.API_BASE_URL || !path) return;
      try {
        await fetch(CONFIG.API_BASE_URL + path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          credentials: 'omit',
          mode: 'cors',
          keepalive: true, // garante envio se o usuário fechar a aba
        });
      } catch (e) {
        // Falha silenciosa — não bloqueia UX
      }
    }

    function postToParent(message) {
      // Restringe origens em vez de '*'. Iterar pra cobrir múltiplos domínios.
      CONFIG.PARENT_ORIGINS.forEach((origin) => {
        try { window.parent.postMessage(message, origin); } catch (e) {}
      });
    }

    function brl(value) {
      return new Intl.NumberFormat('pt-BR', {
        style: 'currency',
        currency: 'BRL',
        minimumFractionDigits: 2,
      }).format(isFinite(value) ? value : 0);
    }

    const FATURAMENTO_OPTIONS = [
      'Ainda não vendo nada, mas tenho uma ideia de produto',
      'Menos de R$10 Mil por mês',
      'Entre R$10 Mil e R$50 Mil por mês',
      'Entre R$50 Mil e R$100 Mil por mês',
      'Entre R$100 Mil e R$1 Milhão por mês',
      'Acima de R$1 Milhão por mês',
    ];

    const PLATAFORMA_OPTIONS = [
      'Hotmart', 'Kiwify', 'PerfectPay', 'Eduzz', 'Monetizze', 'Ticto',
      'Kirvano', 'Guru', 'Asaas', 'Hubla', 'Appmax', 'LastLink', 'Outros', 'Nenhuma',
    ];

    function maskPhone(v) {
      const d = v.replace(/\D/g, '').slice(0, 11);
      if (d.length <= 2) return d;
      if (d.length <= 7) return `(${d.slice(0, 2)}) ${d.slice(2)}`;
      if (d.length <= 10) return `(${d.slice(0, 2)}) ${d.slice(2, 6)}-${d.slice(6)}`;
      return `(${d.slice(0, 2)}) ${d.slice(2, 7)}-${d.slice(7)}`;
    }

    function isValidEmail(s) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
    }

    function ResultadoSimulacao({ total, parcela, extra, parcelas, onRefazer, resultsRef }) {
      return (
        <>
          <div className="divider"></div>
          <div className="results animate-in" ref={resultsRef}>
            <div className="results-header">
              <div className="left">
                <span className="bolt">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 11-13h-7l1-7z"/></svg>
                </span>
                <span className="title">Resultado da simulação</span>
              </div>
              <button type="button" className="refazer-link" onClick={onRefazer}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="23 4 23 10 17 10"/>
                  <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                Refazer
              </button>
            </div>

            <div className="result-block">
              <div className="result-label">Cliente final paga</div>
              <div className="result-value">
                {brl(total)}<span className="result-asterisk">*</span>
              </div>
              <div className="result-sub">em {parcelas}x de <strong>{brl(parcela)}</strong></div>
            </div>

            <div className="result-divider"></div>

            <div className="result-block">
              <div className="result-label green">Você recebe a mais</div>
              <div className="result-value big">
                + {brl(extra)}<span className="result-asterisk">*</span>
              </div>
              <div className="result-sub">de margem nova pelo repasse da taxa adicional configurada.</div>
            </div>
          </div>
        </>
      );
    }

    function Calculadora() {
      // Step state
      const [step, setStep] = useState(0);

      // Form fields
      const [nome, setNome] = useState('');
      const [email, setEmail] = useState('');
      const [whatsapp, setWhatsapp] = useState('');
      const [faturamento, setFaturamento] = useState('');
      const [plataforma, setPlataforma] = useState('');

      // Calculadora fields
      const [valor, setValor] = useState('');
      const [parcelas, setParcelas] = useState(10);
      const [taxaAdicional, setTaxaAdicional] = useState('');
      const [simulated, setSimulated] = useState(false);
      const resultsRef = useRef(null);

      // Anti-bot honeypot — campo invisível. Bots costumam preencher.
      const [hp, setHp] = useState('');

      // Sessão única para correlacionar os 3 steps no CRM
      const sessionRef = useRef(null);
      if (!sessionRef.current) sessionRef.current = uuid();

      // Anti-bot: tempo de início do form (rejeitar submissões instantâneas)
      const startedAtRef = useRef(Date.now());
      const lastStepAtRef = useRef(Date.now());

      // UTM + referrer capturados uma vez
      const trackingMetaRef = useRef(null);
      if (!trackingMetaRef.current) {
        trackingMetaRef.current = {
          referrer: document.referrer || null,
          landing_url: window.location.href,
          utm: captureUTM(),
        };
      }

      const parse = (v) => {
        const n = parseFloat(v);
        return isNaN(n) ? 0 : n;
      };

      const { total, parcela, extra } = useMemo(() => {
        const v = parse(valor);
        const ta = parse(taxaAdicional);
        const p = Math.max(1, parseInt(parcelas) || 1);
        const totalCliente = v * (1 + ta / 100);
        return {
          total: totalCliente,
          parcela: totalCliente / p,
          extra: v * (ta / 100),
        };
      }, [valor, parcelas, taxaAdicional]);

      const step1Valid =
        nome.trim().length >= 2 &&
        isValidEmail(email) &&
        whatsapp.replace(/\D/g, '').length >= 10;
      const step2Valid = faturamento !== '' && plataforma !== '';
      const step3Valid = parse(valor) > 0;

      const inc = () => setParcelas((p) => Math.min(12, p + 1));
      const dec = () => setParcelas((p) => Math.max(1, p - 1));

      const isBot = () => hp.length > 0 || (Date.now() - startedAtRef.current) < 800;

      const handleStep1Next = async () => {
        if (!step1Valid) return;
        if (Date.now() - lastStepAtRef.current < CONFIG.MIN_STEP_MS) return;
        if (isBot()) return;
        await track(CONFIG.ENDPOINTS.step1Identificacao, {
          session_id: sessionRef.current,
          timestamp: new Date().toISOString(),
          step: 1,
          nome: sanitize(nome),
          email: sanitize(email).toLowerCase(),
          whatsapp: sanitize(whatsapp),
          meta: trackingMetaRef.current,
        });
        postToParent({ type: 'cakto:step', payload: { step: 1, session_id: sessionRef.current } });
        lastStepAtRef.current = Date.now();
        setStep(2);
      };

      const handleStep2Next = async () => {
        if (!step2Valid) return;
        if (Date.now() - lastStepAtRef.current < CONFIG.MIN_STEP_MS) return;
        await track(CONFIG.ENDPOINTS.step2Perfil, {
          session_id: sessionRef.current,
          timestamp: new Date().toISOString(),
          step: 2,
          faturamento: sanitize(faturamento),
          plataforma: sanitize(plataforma),
        });
        postToParent({ type: 'cakto:step', payload: { step: 2, session_id: sessionRef.current } });
        lastStepAtRef.current = Date.now();
        setStep(3);
      };

      const handleSimular = async () => {
        if (!step3Valid) return;
        const simulationPayload = {
          session_id: sessionRef.current,
          timestamp: new Date().toISOString(),
          step: 3,
          valor: parse(valor),
          parcelas: Math.max(1, parseInt(parcelas) || 1),
          taxa_adicional: parse(taxaAdicional),
          total,
          extra,
        };
        // 1) Backend: dado do step 3 vinculado pela sessão
        track(CONFIG.ENDPOINTS.step3Simulacao, simulationPayload);

        // 2) Framer Code Override: APENAS dados de cálculo + session_id (sem PII)
        postToParent({
          type: 'cakto:simulado',
          payload: {
            session_id: sessionRef.current,
            valor: simulationPayload.valor,
            parcelas: simulationPayload.parcelas,
            taxaAdicional: simulationPayload.taxa_adicional,
            total,
            extra,
          },
        });

        setSimulated(true);
        setTimeout(() => {
          if (resultsRef.current) {
            resultsRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }, 50);
      };

      const handleRefazer = () => {
        setValor('');
        setParcelas(10);
        setTaxaAdicional('');
        setSimulated(false);
      };

      const handleBack = () => {
        if (step === 3 && simulated) {
          setSimulated(false);
          return;
        }
        setStep((s) => Math.max(1, s - 1));
      };

      return (
        <div className="app">
          <div className="header">
            <div className="header-left">
              <div className="header-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="4" y="3" width="16" height="18" rx="2"/>
                  <line x1="8" y1="7" x2="16" y2="7"/>
                  <line x1="9" y1="12" x2="10" y2="12"/>
                  <line x1="14" y1="12" x2="15" y2="12"/>
                  <line x1="9" y1="16" x2="10" y2="16"/>
                  <line x1="14" y1="16" x2="15" y2="16"/>
                </svg>
              </div>
              <span className="header-title">Simule seu ganho</span>
            </div>
            {step >= 1 && step <= 3 && (
              <div className="progress" aria-label={`Passo ${step} de 3`}>
                {[1, 2, 3].map((n) => (
                  <span
                    key={n}
                    className={`progress-dot ${step === n ? 'active' : step > n ? 'done' : ''}`}
                  />
                ))}
              </div>
            )}
          </div>

          {step === 0 && (
            <div className="step">
              <span className="intro-pill">
                <span className="dot"></span>
                Cálculo grátis · 60 segundos
              </span>
              <h2 className="intro-title">
                Quanto disso volta <span className="accent">pro seu bolso?</span>
              </h2>
              <p className="intro-description">
                A maioria dos produtores vê parte do dinheiro virar juros da operadora. Com a Cakto, essa margem volta pra você. Vamos calcular o quanto?
              </p>

              <div className="intro-benefits-label">O que você leva na Cakto</div>
              <div className="intro-benefits">
                <div className="intro-benefit">
                  <span className="intro-benefit-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </span>
                  <span className="intro-benefit-text">
                    Taxa a partir de <strong>1,99% no cartão</strong>
                  </span>
                </div>
                <div className="intro-benefit">
                  <span className="intro-benefit-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </span>
                  <span className="intro-benefit-text">
                    Gerente de contas <strong>exclusivo 24/7</strong>
                  </span>
                </div>
                <div className="intro-benefit">
                  <span className="intro-benefit-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="20 6 9 17 4 12"/>
                    </svg>
                  </span>
                  <span className="intro-benefit-text">
                    <strong>Migração assistida</strong> sem perder uma venda
                  </span>
                </div>
              </div>

              <button
                type="button"
                className="cta-primary"
                onClick={() => {
                  startedAtRef.current = Date.now();
                  lastStepAtRef.current = Date.now();
                  setStep(1);
                }}
              >
                Calcular meu ganho
                <span className="arrow">→</span>
              </button>
              <p className="intro-trust">Leva menos de 1 minuto. Sem compromisso.</p>
            </div>
          )}

          {step === 1 && (
            <div className="step">
              <h2 className="step-title">Antes de simular, conta pra gente</h2>
              <p className="step-subtitle">Vamos te enviar o resultado da simulação e o passo a passo pra ativar.</p>

              <div className="field">
                <label htmlFor="nome">Nome completo</label>
                <input
                  id="nome"
                  className="text-input"
                  type="text"
                  placeholder="Ex: Rafael Mendes dos Santos"
                  value={nome}
                  onChange={(e) => setNome(e.target.value)}
                />
              </div>

              <div className="field">
                <label htmlFor="email">Digite seu melhor e-mail</label>
                <input
                  id="email"
                  className="text-input"
                  type="email"
                  placeholder="voce@empresa.com"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                />
              </div>

              <div className="field">
                <label htmlFor="whatsapp">Número de whatsapp</label>
                <input
                  id="whatsapp"
                  className="text-input"
                  type="tel"
                  inputMode="numeric"
                  placeholder="(11) 99999-9999"
                  value={whatsapp}
                  onChange={(e) => setWhatsapp(maskPhone(e.target.value))}
                />
              </div>

              {/* Honeypot anti-bot — invisível pra humanos, atrai bots */}
              <input
                type="text"
                name="website"
                tabIndex={-1}
                autoComplete="off"
                value={hp}
                onChange={(e) => setHp(e.target.value)}
                style={{ position: 'absolute', left: '-10000px', top: 'auto', width: '1px', height: '1px', overflow: 'hidden' }}
                aria-hidden="true"
              />

              <div className="nav">
                <button
                  type="button"
                  className="cta-primary"
                  onClick={handleStep1Next}
                  disabled={!step1Valid}
                >
                  Próximo
                  <span className="arrow">→</span>
                </button>
              </div>
            </div>
          )}

          {step === 2 && (
            <div className="step">
              <h2 className="step-title">Conta um pouco do seu negócio</h2>
              <p className="step-subtitle">É rapidinho — só pra adaptar a simulação ao seu cenário.</p>

              <div className="field">
                <label htmlFor="faturamento">Qual o seu faturamento médio mensal com infoprodutos?</label>
                <p className="field-helper">Considere apenas produtos digitais: Ebooks, Cursos Online, Mentorias, SaaS, etc.</p>
                <select
                  id="faturamento"
                  className={`select-input ${!faturamento ? 'placeholder' : ''}`}
                  value={faturamento}
                  onChange={(e) => setFaturamento(e.target.value)}
                >
                  <option value="" disabled>Selecione a opção</option>
                  {FATURAMENTO_OPTIONS.map((opt) => (
                    <option key={opt} value={opt}>{opt}</option>
                  ))}
                </select>
              </div>

              <div className="field">
                <label>Em qual plataforma de infoprodutos você roda atualmente?</label>
                <div className="radio-list" role="radiogroup" aria-label="Plataforma atual">
                  {PLATAFORMA_OPTIONS.map((opt) => (
                    <label
                      key={opt}
                      className={`radio-item ${plataforma === opt ? 'selected' : ''}`}
                    >
                      <input
                        type="radio"
                        name="plataforma"
                        value={opt}
                        checked={plataforma === opt}
                        onChange={() => setPlataforma(opt)}
                      />
                      <span className="radio-label">{opt}</span>
                    </label>
                  ))}
                </div>
              </div>

              <div className="nav">
                <button type="button" className="cta-secondary" onClick={handleBack}>
                  <span className="arrow">←</span>
                  Voltar
                </button>
                <button
                  type="button"
                  className="cta-primary"
                  onClick={handleStep2Next}
                  disabled={!step2Valid}
                >
                  Próximo
                  <span className="arrow">→</span>
                </button>
              </div>
            </div>
          )}

          {step === 3 && !simulated && (
            <div className="step">
              <div className="field">
                <label>Valor da venda</label>
                <div className="input-wrapper">
                  <span className="prefix">R$</span>
                  <input
                    type="number"
                    min="0"
                    step="0.01"
                    placeholder="5.000,00"
                    value={valor}
                    onChange={(e) => setValor(e.target.value)}
                  />
                </div>
              </div>

              <div className="field-row">
                <div className="field">
                  <label>Parcelas</label>
                  <div className="input-wrapper">
                    <div className="stepper">
                      <button type="button" onClick={dec} disabled={parcelas <= 1} aria-label="Diminuir parcelas">−</button>
                      <span className="stepper-value">{parcelas}x</span>
                      <button type="button" onClick={inc} disabled={parcelas >= 12} aria-label="Aumentar parcelas">+</button>
                    </div>
                  </div>
                </div>
                <div className="field">
                  <label>Taxa adicional</label>
                  <div className="input-wrapper">
                    <input
                      type="number"
                      min="0"
                      step="0.01"
                      placeholder="10,00"
                      value={taxaAdicional}
                      onChange={(e) => setTaxaAdicional(e.target.value)}
                    />
                    <span className="suffix">%</span>
                  </div>
                </div>
              </div>

              <div className="nav">
                <button type="button" className="cta-secondary" onClick={handleBack}>
                  <span className="arrow">←</span>
                  Voltar
                </button>
                <button
                  type="button"
                  className="cta-primary"
                  onClick={handleSimular}
                  disabled={!step3Valid}
                >
                  Simular meu ganho
                  <span className="arrow">→</span>
                </button>
              </div>

              <p className="helper">Veja em tempo real quanto de juros volta pra você em cada venda parcelada.</p>
            </div>
          )}

          {step === 3 && simulated && <ResultadoSimulacao
            total={total}
            parcela={parcela}
            extra={extra}
            parcelas={parcelas}
            onRefazer={handleRefazer}
            resultsRef={resultsRef}
          />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Calculadora />);
  </script>
</body>
</html>
